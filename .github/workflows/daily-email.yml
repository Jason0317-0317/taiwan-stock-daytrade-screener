name: Daily Email Report

on:
  schedule:
    # Sunday-Thursday 20:00 UTC is Monday-Friday 04:00 in Taipei.
    # Do not run or send email on Saturday and Sunday (Taipei time).
    - cron: "0 20 * * 0-4"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate stock report
        run: python main.py

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 台股隔日當沖候選分析報告
          to: ${{ secrets.MAIL_TO }}
          from: Taiwan Stock Quant Bot <${{ secrets.MAIL_USERNAME }}>
          html_body: file://report.html
          body: |
            台股隔日當沖候選分析報告已完成。若郵件系統無法顯示 HTML，請下載附件查看前 10 名詳細資料。
          attachments: final_rankings.csv,report.html
